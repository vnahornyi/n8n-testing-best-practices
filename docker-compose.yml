version: "3.8"

services:
  n8n:
    image: n8nio/n8n:2.21.0
    container_name: n8n-order-processing
    ports:
      - "5678:5678"
    environment:
      - N8N_HOST=localhost
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - WEBHOOK_URL=http://localhost:5678/
      - NODE_FUNCTION_ALLOW_EXTERNAL=zod
      - NODE_FUNCTION_ALLOW_BUILTIN=fs
      - N8N_ENFORCE_SETTINGS_FILE_PERMISSIONS=true
      - N8N_RUNNERS_ENABLED=true
    volumes:
      - ./.n8n-docker:/home/node/.n8n
      - ./data:/data
    depends_on:
      - payment-mock

  payment-mock:
    image: node:20-alpine
    container_name: n8n-payment-mock
    working_dir: /app
    command: ["node", "mocks/payment-api.js"]
    ports:
      - "3001:3001"
    volumes:
      - ./:/app
